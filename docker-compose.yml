services:
  vibeframe:
    build: .
    container_name: vibeframe
    restart: unless-stopped
    ports:
      - "8080:8080"
    devices:
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/i2c-1:/dev/i2c-1"
      - "/dev/gpiochip0:/dev/gpiochip0"
    # Numeric GIDs from the Pi host (group_add resolves names against the
    # container's /etc/group, not the host, so we pass IDs directly).
    # Verify on your Pi with: getent group spi gpio i2c
    group_add:
      - "989"  # spi
      - "986"  # gpio
      - "988"  # i2c
    volumes:
      # Host-mounted NFS share goes here. Mount on the Pi with fstab or systemd.mount,
      # then bind the mountpoint in. Example fstab line:
      #   nas:/photos /mnt/nas/photos nfs ro,vers=4.1,bg,soft,timeo=100 0 0
      - /mnt/vibeFrame:/vibeFrame
      - vibeframe-state:/var/lib/vibeframe
      - vibeframe-cache:/var/cache/vibeframe
      # Host devicetree — gpiodevice (used by inky) reads this to detect the
      # Pi model and pick the right gpiochip. Without it, inky fails with
      # "No compatible platform detected!" on first show().
      - /sys/firmware/devicetree:/sys/firmware/devicetree:ro
    env_file: .env

volumes:
  vibeframe-state:
  vibeframe-cache:
