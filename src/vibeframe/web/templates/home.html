{% extends "base.html" %}
{% block body %}
<section class="now-showing">
  <h2>Now showing</h2>
  <div id="now-showing-fragment"
       hx-get="/system/now-showing"
       hx-trigger="load delay:30s, every 30s"
       hx-swap="innerHTML">
    {% include "_now_showing.html" %}
  </div>
  <form hx-post="/system/next" hx-swap="none"
        hx-on::after-request="htmx.trigger('#now-showing-fragment', 'load')">
    <button type="submit">Show next now</button>
  </form>
</section>

<section class="upload">
  <h2>Upload</h2>
  <form hx-post="/images/upload"
        hx-encoding="multipart/form-data"
        hx-target="#upload-result"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input type="file" name="files" accept="image/*" multiple required />
    <button type="submit">Upload to NFS</button>
  </form>
  <div id="upload-result" aria-live="polite"></div>
</section>
{% endblock %}
