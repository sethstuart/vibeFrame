{% if last_id %}
<div class="image-frame">
  <img src="/images/{{ last_id }}/source-cropped.jpg?v={{ last_shown_ts }}"
       alt="Currently on the panel" loading="lazy" />
</div>
<div class="hero-caption">
  <span class="path">{{ last_path.split('/')[-1] }}</span>
  <span class="when">{% if last_shown_at %}shown {{ last_shown_at.strftime('%H:%M:%S UTC') }}{% endif %}</span>
  <a href="/images/{{ last_id }}/preview.png" target="_blank" class="muted">View panel render →</a>
</div>
{% else %}
<div class="image-frame"><p class="empty">No image displayed yet.</p></div>
{% endif %}
